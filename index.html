<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Racer - 4v1$</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
        
        #gameCanvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        
        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-text { position: absolute; top: 20px; left: 20px; font-size: 24px; text-shadow: 2px 2px 0 #000; font-weight: bold; z-index: 5; }
        .dev-credit { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 14px; opacity: 0.7; text-shadow: 1px 1px 0 #000; pointer-events: none; }
        
        /* Controls Container */
        .controls { position: absolute; bottom: 30px; pointer-events: auto; display: flex; gap: 15px; z-index: 10; }
        .ctrl-left { left: 30px; }
        .ctrl-right { right: 30px; }
        
        /* Tombol Pixel Style */
        .btn { 
            width: 70px; height: 70px; 
            background: rgba(255, 165, 0, 0.8); 
            border: 4px solid #fff; 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer;
            box-shadow: 0 6px 0 #cc8400, 0 8px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active, .btn.active { transform: translateY(6px); box-shadow: 0 0 0 #cc8400, inset 0 2px 5px rgba(0,0,0,0.3); }
        .btn-pause { background: rgba(255, 50, 50, 0.8); box-shadow: 0 6px 0 #aa0000; }
        .btn-pause:active { box-shadow: 0 0 0 #aa0000; }
        
        /* Start Screen */
        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 20; pointer-events: auto;
        }
        h1 { font-size: 40px; color: #ff9d00; text-shadow: 4px 4px 0 #5c2e00; margin-bottom: 20px; text-align: center; line-height: 1.2; }
        p { font-size: 18px; margin-bottom: 30px; max-width: 80%; text-align: center; line-height: 1.5; }
        
        /* Hide controls on desktop if needed, but keep for hybrid */
        @media (min-width: 1024px) {
            .controls { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-text">SCORE: <span id="scoreVal">0</span></div>
        <div class="dev-credit">4v1$@mvrocketruns</div>
        
        <!-- Kontrol Kiri: Arah -->
        <div class="controls ctrl-left">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        
        <!-- Kontrol Kanan: Aksi -->
        <div class="controls ctrl-right">
            <div class="btn btn-pause" id="btnPause">⏸</div>
            <div class="btn" id="btnGas">▲</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>CRYPTO RACER</h1>
        <p>Let's Ride!<br>Get your highest score<br>😺🧡😽<br>🚗....play on......<br>smartphone/Tablet<br>😺<br>donate: 0xe4a0ee42534e9c60c0fda0f1b1c3e61a51d0cc19</p>
        <div class="btn" id="btnStart" style="width: 150px; font-size: 24px;">START GAME</div>
    </div>

<script>
/**
 * CRYPTO RACER - Fixed Version
 * Design by mvrocketruns/0x4v1$
 * Bug Fixes & Optimization by Qwen
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimasi rendering

// ========== SOUND ENGINE ==========
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.isInitialized = false;
        this.engineNodes = null;
        this.isEngineRunning = false;
        this.currentRPM = 0;
        this.targetRPM = 0;
    }

    init() {
        if (this.isInitialized) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            this.ctx = new AudioContext();
            
            // Master Gain untuk engine
            const masterGain = this.ctx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(this.ctx.destination);

            // Oscillators
            const osc1 = this.ctx.createOscillator(); // Sawtooth
            const osc2 = this.ctx.createOscillator(); // Square
            const osc3 = this.ctx.createOscillator(); // Sine Sub
            
            const gain1 = this.ctx.createGain();
            const gain2 = this.ctx.createGain();
            const gain3 = this.ctx.createGain();

            // Setup OSC 1
            osc1.type = 'sawtooth';
            osc1.frequency.value = 55;
            gain1.gain.value = 0.3;
            osc1.connect(gain1);
            gain1.connect(masterGain);

            // Setup OSC 2
            osc2.type = 'square';
            osc2.frequency.value = 110;
            gain2.gain.value = 0.15;
            osc2.connect(gain2);
            gain2.connect(masterGain);

            // Setup OSC 3
            osc3.type = 'sine';
            osc3.frequency.value = 27.5;
            gain3.gain.value = 0.4;
            osc3.connect(gain3);
            gain3.connect(masterGain);

            // Start oscillators immediately (they are silent due to gain 0)
            osc1.start();
            osc2.start();
            osc3.start();

            this.engineNodes = {
                master: masterGain,
                osc1, osc2, osc3,
                gain1, gain2, gain3
            };

            this.isInitialized = true;
            console.log('Sound Engine initialized');
        } catch(e) {
            console.warn('Web Audio not supported:', e);
        }
    }

    resumeContext() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    startEngine() {
        if (!this.isInitialized) this.init();
        this.resumeContext();
        if (this.isEngineRunning) return;
        
        this.isEngineRunning = true;
        if (this.engineNodes) {
            this.engineNodes.master.gain.setTargetAtTime(0.15, this.ctx.currentTime, 0.1);
        }
    }

    stopEngine() {
        if (!this.isEngineRunning) return;
        this.isEngineRunning = false;
        if (this.engineNodes) {
            this.engineNodes.master.gain.setTargetAtTime(0, this.ctx.currentTime, 0.1);
        }
    }

    updateEngineSound(speed, isGas) {
        if (!this.isInitialized || !this.engineNodes) return;
        
        // Hitung RPM berdasarkan speed dan gas
        let baseRPM = 55 + (speed * 3);
        if (isGas) {
            this.targetRPM = Math.min(baseRPM * 2.5, 300);
        } else {
            this.targetRPM = Math.max(baseRPM * 0.8, 40);
        }
        
        // Smooth RPM transition
        this.currentRPM += (this.targetRPM - this.currentRPM) * 0.05;
        
        const t = this.ctx.currentTime;
        this.engineNodes.osc1.frequency.setTargetAtTime(this.currentRPM, t, 0.01);
        this.engineNodes.osc2.frequency.setTargetAtTime(this.currentRPM * 2, t, 0.01);
        this.engineNodes.osc3.frequency.setTargetAtTime(this.currentRPM / 2, t, 0.01);
        
        // Effek distortion saat gas penuh
        let gainMul = isGas ? 0.8 : 0.4;
        this.engineNodes.gain1.gain.setTargetAtTime(0.3 * gainMul, t, 0.01);
        this.engineNodes.gain2.gain.setTargetAtTime(0.15 * gainMul, t, 0.01);
        this.engineNodes.gain3.gain.setTargetAtTime(0.4 * gainMul, t, 0.01);
        
        // Volume total naik saat gas
        let volTarget = isGas ? 0.25 : 0.1;
        // Hanya update jika engine sedang running
        if (this.isEngineRunning) {
            this.engineNodes.master.gain.setTargetAtTime(volTarget, t, 0.05);
        }
    }

    playCrash() {
        if (!this.isInitialized) this.init();
        this.resumeContext();
        if (!this.ctx) return;
        
        try {
            const t = this.ctx.currentTime;
            // Noise untuk crash
            const bufferSize = this.ctx.sampleRate * 0.5;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufferSize * 3);
            }
            
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.6, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            
            noise.start(t);
            noise.stop(t + 0.5);
            
            // Nada rendah benturan
            const osc = this.ctx.createOscillator();
            const oscGain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 80;
            oscGain.gain.setValueAtTime(0.5, t);
            oscGain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            
            osc.connect(oscGain);
            oscGain.connect(this.ctx.destination);
            osc.start(t);
            osc.stop(t + 0.3);
            
        } catch(e) {
            console.warn('Crash sound error:', e);
        }
    }
}

// ========== GAME ENGINE ==========
const sound = new SoundEngine();

// State Game
let gameState = 'MENU'; // MENU, PLAYING, PAUSED, GAMEOVER, CRASHING
let score = 0;
let speed = 0;
let baseSpeed = 5;
let roadOffset = 0;
let lastTime = 0;
let isCrashing = false; // Flag untuk mencegah double crash

// Input State
const keys = { left: false, right: false, gas: false };

// Objek Pemain
const player = {
    x: 0, y: 0, w: 30, h: 70, 
    laneX: 0, targetLaneX: 0,
    color: '#ff9d00'
};

// Musuh & Dekorasi
let enemies = [];
let buildings = [];
let particles = [];
const MAX_PARTICLES = 150; // Batasi partikel untuk performa

// Inisialisasi Ukuran Layar
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Reset posisi player ke tengah jika di menu atau game over
    if (gameState === 'MENU' || gameState === 'GAMEOVER') {
        player.y = canvas.height - 180;
        player.x = canvas.width / 2 - player.w / 2;
        player.targetLaneX = player.x;
    } else {
        // Jika sedang main, sesuaikan Y saja, X biarkan relatif
        player.y = canvas.height - 180;
        // Clamp X agar tidak keluar layar setelah resize
        const roadMargin = 40;
        if (player.x > canvas.width - player.w - roadMargin) {
            player.x = canvas.width - player.w - roadMargin;
            player.targetLaneX = player.x;
        }
    }
}
window.addEventListener('resize', resize);
resize();

// --- SISTEM INPUT ---
function bindBtn(id, key) {
    const el = document.getElementById(id);
    if (!el) return;
    
    const start = (e) => { 
        if (e.cancelable) e.preventDefault(); 
        keys[key] = true; 
        el.classList.add('active');
        // Pastikan audio context aktif saat interaksi pertama
        sound.resumeContext();
    };
    const end = (e) => { 
        if (e.cancelable) e.preventDefault(); 
        keys[key] = false; 
        el.classList.remove('active');
    };
    
    // Gunakan passive: false untuk touch agar preventDefault bekerja
    el.addEventListener('touchstart', start, {passive: false});
    el.addEventListener('touchend', end, {passive: false});
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', end);
}

bindBtn('btnLeft', 'left');
bindBtn('btnRight', 'right');
bindBtn('btnGas', 'gas');

const btnPause = document.getElementById('btnPause');
if (btnPause) {
    btnPause.addEventListener('click', togglePause);
    btnPause.addEventListener('touchstart', (e)=>{e.preventDefault(); togglePause();}, {passive: false});
}

// Keyboard Fallback
window.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') keys.left = true;
    if(e.key === 'ArrowRight') keys.right = true;
    if(e.key === 'ArrowUp' || e.key === ' ') keys.gas = true;
    if(e.key === 'Escape') togglePause();
    sound.resumeContext();
});
window.addEventListener('keyup', e => {
    if(e.key === 'ArrowLeft') keys.left = false;
    if(e.key === 'ArrowRight') keys.right = false;
    if(e.key === 'ArrowUp' || e.key === ' ') keys.gas = false;
});

const btnStart = document.getElementById('btnStart');
if (btnStart) {
    btnStart.addEventListener('click', startGame);
    btnStart.addEventListener('touchstart', (e)=>{e.preventDefault(); startGame();}, {passive: false});
}

function togglePause() {
    if(gameState === 'PLAYING') {
        gameState = 'PAUSED';
        sound.stopEngine();
    } else if(gameState === 'PAUSED') {
        gameState = 'PLAYING';
        sound.startEngine();
    }
}

function startGame() {
    // Init sound pasti disini
    sound.init();
    sound.resumeContext();
    
    gameState = 'PLAYING';
    isCrashing = false;
    score = 0;
    speed = baseSpeed;
    enemies = [];
    particles = [];
    
    player.x = canvas.width / 2 - player.w / 2;
    player.targetLaneX = player.x;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('scoreVal').innerText = '0';
    
    // Mulai suara mesin
    sound.startEngine();
    
    // Generate bangunan awal
    buildings = [];
    for(let i=0; i<12; i++) {
        createBuilding(i * 150);
    }
}

function createBuilding(yPos) {
    const side = Math.random() < 0.5 ? 'left' : 'right';
    buildings.push({
        x: side === 'left' ? 0 : canvas.width - 80, 
        y: yPos !== undefined ? yPos : -200, 
        w: 80, 
        h: 120 + Math.random()*100, 
        c: `hsl(${Math.random()*60 + 240}, 30%, ${15 + Math.random()*20}%)`
    });
}

function gameOver() {
    if (isCrashing) return; // Cegah pemanggilan ganda
    isCrashing = true;
    gameState = 'GAMEOVER';
    sound.stopEngine();
    sound.playCrash();
    
    setTimeout(() => {
        const screen = document.getElementById('start-screen');
        screen.style.display = 'flex';
        screen.querySelector('h1').innerText = "GAME OVER";
        screen.querySelector('p').innerHTML = `score: ${Math.floor(score)}<br>RESTART & PLAY AGAIN`;
        document.getElementById('btnStart').innerText = "RESTART";
    }, 500); // Delay sedikit agar terlihat ledakannya
}

// --- LOGIKA UPDATE ---
function update(dt) {
    if(gameState !== 'PLAYING') return;

    // Kecepatan berdasarkan Gas
    let currentSpeed = keys.gas ? speed * 2 : speed;
    roadOffset += currentSpeed;
    score += currentSpeed * 0.05;
    document.getElementById('scoreVal').innerText = Math.floor(score);

    // UPDATE SUARA MESIN
    sound.updateEngineSound(currentSpeed, keys.gas);

    // Pergerakan Pemain
    if(keys.left) player.targetLaneX -= 8;
    if(keys.right) player.targetLaneX += 8;
    
    const roadMargin = 40;
    if(player.targetLaneX < roadMargin) player.targetLaneX = roadMargin;
    if(player.targetLaneX > canvas.width - player.w - roadMargin) player.targetLaneX = canvas.width - player.w - roadMargin;
    
    // Smooth movement
    player.x += (player.targetLaneX - player.x) * 0.2;

    // Spawn Musuh
    if(Math.random() < 0.02 && enemies.length < 5) {
        enemies.push({
            x: roadMargin + Math.random() * (canvas.width - roadMargin*2 - 60),
            y: -150, w: 30, h: 60, 
            speed: 2 + Math.random() * 3,
            color: ['#3498db', '#e74c3c', '#9b59b6', '#2ecc71'][Math.floor(Math.random()*4)]
        });
    }

    // Update Musuh
    for(let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.y += currentSpeed - e.speed;
        
        // Collision Detection (AABB)
        // Tambahkan padding kecil agar hitbox lebih forgiving
        const padding = 5;
        if (player.x + padding < e.x + e.w - padding && 
            player.x + player.w - padding > e.x + padding &&
            player.y + padding < e.y + e.h - padding && 
            player.y + player.h - padding > e.y + padding) {
            
            createExplosion(player.x + player.w/2, player.y + player.h/2);
            gameOver();
            return; // Stop update frame ini
        }

        if(e.y > canvas.height) enemies.splice(i, 1);
    }

    // Update Bangunan
    buildings.forEach(b => {
        b.y += currentSpeed * 0.5;
        if(b.y > canvas.height) {
            b.y = -200;
            b.x = Math.random() < 0.5 ? 0 : canvas.width - 80;
            b.h = 120 + Math.random()*100;
        }
    });

    // Partikel Knalpot
    if(keys.gas && Math.random() > 0.5 && particles.length < MAX_PARTICLES) {
        particles.push({
            x: player.x + player.w/2 + (Math.random()-0.5)*20, 
            y: player.y + player.h, 
            vx: (Math.random()-0.5)*2, 
            vy: 2 + Math.random()*3, 
            life: 20, 
            size: 4 + Math.random()*4,
            c: 'rgba(200,200,200,0.6)'
        });
    }
    
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; 
        p.y += p.vy; 
        p.life--; 
        p.size *= 0.9;
        if(p.life <= 0 || p.size < 0.5) particles.splice(i, 1);
    }
}

function createExplosion(x, y) {
    for(let i=0; i<30; i++) {
        if (particles.length >= MAX_PARTICLES) particles.shift(); // Hapus yang lama jika penuh
        particles.push({
            x: x, y: y, 
            vx: (Math.random()-0.5)*15, 
            vy: (Math.random()-0.5)*15, 
            life: 40, 
            size: 5 + Math.random()*8, 
            c: '#ff4500'
        });
    }
}

// --- RENDER ---
function drawCar(x, y, w, h, color, isPlayer) {
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x + 5, y + 10, w - 10, h - 20);
    
    // Windshield/Cabin
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 10, y + 25, w - 20, h - 50);
    
    // Headlights
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 5, y + 5, 12, 8);
    ctx.fillRect(x + w - 17, y + 5, 12, 8);
    
    // Taillights
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x + 5, y + h - 10, 12, 6);
    ctx.fillRect(x + w - 17, y + h - 10, 12, 6);
    
    if(isPlayer) {
        // Logo Bitcoin
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('₿', x + w/2, y + h/2 + 8);
        
        // Bumper detail
        ctx.fillStyle = color;
        ctx.fillRect(x, y + h - 15, w, 8);
    }
}

function draw() {
    // Clear canvas
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sky Gradient
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#2c3e50');
    grad.addColorStop(0.4, '#8e44ad');
    grad.addColorStop(0.7, '#e67e22');
    grad.addColorStop(1, '#f1c40f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sun/Moon
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height * 0.3, 80, 0, Math.PI*2);
    ctx.fill();

    // Buildings
    buildings.forEach(b => {
        ctx.fillStyle = b.c;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        
        // Windows
        ctx.fillStyle = 'rgba(255,255,200,0.3)';
        for(let wy = b.y + 10; wy < b.y + b.h - 10; wy += 20) {
            for(let wx = b.x + 10; wx < b.x + b.w - 10; wx += 15) {
                // Simple deterministic random for windows based on position
                if ((wx * wy) % 3 !== 0) ctx.fillRect(wx, wy, 8, 12);
            }
        }
    });

    // Road
    ctx.fillStyle = '#34495e';
    ctx.fillRect(40, 0, canvas.width - 80, canvas.height);
    
    // Road Lines
    ctx.fillStyle = '#ecf0f1';
    let dashH = 60;
    let gap = 40;
    let total = dashH + gap;
    let startY = roadOffset % total - total;
    for(let y = startY; y < canvas.height; y += total) {
        ctx.fillRect(canvas.width/2 - 5, y, 10, dashH);
    }

    // Particles
    particles.forEach(p => {
        ctx.fillStyle = p.c || 'rgba(200,200,200,0.6)';
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    // Enemies
    enemies.forEach(e => drawCar(e.x, e.y, e.w, e.h, e.color, false));

    // Player
    if(gameState !== 'GAMEOVER' || !isCrashing) {
        drawCar(player.x, player.y, player.w, player.h, player.color, true);
    }

    // Pause Overlay
    if(gameState === 'PAUSED') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);
    }
}

// Loop Utama
function loop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    
    // Cap dt untuk mencegah lompatan besar jika tab tidak aktif
    if (dt > 100) dt = 100;
    
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
